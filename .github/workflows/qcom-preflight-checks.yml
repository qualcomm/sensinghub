name: Qualcomm Preflight Checks

on:
  pull_request_target:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  qcom-preflight-checks:
    uses: qualcomm/qcom-reusable-workflows/.github/workflows/qcom-preflight-checks-reusable-workflow.yml@v1.1.4
    with:
      # ✅ Preflight Checkers
      repolinter: true
      semgrep: true
      copyright-license-detector: true
      pr-check-emails: true
      dependency-review: true
      enable-armor-checkers: true
      armor-checker-options: '{"build-script":"./build.sh","runs-on":{"group":"QHA-Core-Prd-SelfHosted-RG","labels":["self-hosted","license-prd-us4408-amd64-xlarge-ubuntu"]}}'

