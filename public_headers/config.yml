project: https://github.com/qualcomm/sensinghub

branches:
  main:
    modes:
      non-blocking:
        headers:
          - common/inc/*.h
          - session/1.0/inc/*.h
          - utils/inc/*.h

abi_checks:
  - path: usr/lib/libsensinghubapi.so
    headers:
      - common/inc/*.h
      - session/1.0/inc/*.h

  - path: usr/lib/libsensinghubsession.so
    headers:
      - common/inc/*.h
      - session/1.0/inc/*.h

  - path: usr/lib/libqshUtil.so
    headers:
      - common/inc/*.h
      - session/1.0/inc/*.h
      - utils/inc/*.h